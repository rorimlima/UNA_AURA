<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8913A"/>
      <stop offset="50%" style="stop-color:#E2C98A"/>
      <stop offset="100%" style="stop-color:#B8913A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- UNA text -->
  <text x="60" y="82" font-family="'Playfair Display',Georgia,serif" font-size="52" font-weight="700" fill="#B8913A" letter-spacing="6">UNA</text>
  <!-- Aura text in pink script style -->
  <text x="96" y="128" font-family="'Playfair Display',Georgia,serif" font-size="48" font-style="italic" fill="#D4688A" letter-spacing="2">Aura</text>
  <!-- Decorative swoosh -->
  <path d="M 30 138 Q 80 124 160 130 Q 240 136 290 122" stroke="#B8913A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Star sparkles -->
  <g fill="#C9A96E" filter="url(#glow)">
    <polygon points="28,118 30,112 32,118 38,120 32,122 30,128 28,122 22,120" transform="scale(0.7) translate(12,48)"/>
    <polygon points="28,118 30,112 32,118 38,120 32,122 30,128 28,122 22,120" transform="scale(0.4) translate(680,260)"/>
  </g>
  <!-- Pink gem diamond -->
  <polygon points="278,140 284,132 290,140 284,148" fill="#D4688A" opacity="0.9"/>
</svg>
